<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/destyle.css" />
    <script src="../js/main.js" defer></script>
    <title>Detail | itsumono</title>
    <style>
      .ymd {
        padding: 30px 20px 10px 20px;
        text-align: center;
        font-size: 24px;
        margin-bottom: 20px;
        font-weight: bold;
      }

      .img-board {
        margin: 10px 20px;
        font-size: 18px;
        padding: 20px;
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        overflow-y: auto;
        max-height: 500px;
        box-shadow: 0 0 5px 0 rgba(0, 0, 0, 0.1);
      }

      .img-board-item-img {
        margin: 10px;
      }

      .star {
        margin-bottom: 10px;
      }

      .tag {
        margin-bottom: 10px;
      }

      .comment {
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <header>
      <div>
        <a href="home.html"><h1 class="logo">itsumono</h1></a>
      </div>
    </header>

    <main>
      <section class="img-board">
        <table>
          <div>
            <div class="ymd">2024/12/10</div>
            <div class="img">
              <img class="img-board-item-img" src="../img/talk.png" alt="" />
              <img class="img-board-item-img" src="../img/talk.png" alt="" />
              <img class="img-board-item-img" src="../img/talk.png" alt="" />
            </div>
            <div class="star">⭐️⭐️⭐️⭐️⭐️</div>
            <div class="tag">#ロング #前髪</div>
            <div class="comment">comment：ロングにしてみた。前髪が微妙かも</div>
          </div>
        </table>
      </section>

      <section class="control-nav">
        <button id="home-button" class="control-nav-button">
          <img class="control-nav-img" src="../img/home.png" alt="ホーム" />
        </button>
        <button id="add-button" class="control-nav-button">
          <img class="control-nav-img" src="../img/add.png" alt="追加" />
        </button>
        <button id="setting-button" class="control-nav-button">
          <img class="control-nav-img" src="../img/setting.png" alt="設定" />
        </button>
        <button id="logout-button" class="control-nav-button">
          <img
            class="control-nav-img"
            src="../img/logout.png"
            alt="ログアウト"
          />
        </button>
      </section>
    </main>
  </body>
</html>
