<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/destyle.css" />
    <script src="js/main.js" defer></script>
    <title>Document</title>
  </head>
  <body>
    <header>
      <div><h1 class="logo">いつものやつで</h1></div>
    </header>

    <main>
      <h2>写真の追加はこちらから</h2>
      <form action="/submit" method="POST" enctype="multipart/form-data">
        <p>ヘアスタイル：</p>
        <p>前髪の画像：</p>
        <input type="file" name="front_image" />
        <p>側面の画像：</p>
        <input type="file" name="side_image" />
        <p>後ろの画像：</p>
        <input type="file" name="back_image" />
        <p>その他の画像：</p>
        <input type="file" name="other_image" />
        <p>星の数：</p>
        <select name="star">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
        <p>コメント：</p>
        <textarea name="comment" cols="30" rows="10"></textarea>
        <p>タグ：</p>
        <select name="tag" multiple>
          <!-- タグのオプションをここに追加 -->
          <!-- ここphpでdbから選択肢持ってくる -->
        </select>
        <button type="submit">追加</button>
        <button type="button" onclick="location.href='./home.html'">
          <p>戻る</p>
        </button>
      </form>
            <section class="control-nav"></section>
        <button id="home-button" class="control-nav-button">
          <img class="control-nav-img" src="img/home.png" alt="ホーム" />
        </button>
        <button id="add-button" class="control-nav-button">
          <img class="control-nav-img" src="img/add.png" alt="追加" />
        </button>
        <button id="setting-button" class="control-nav-button">
          <img class="control-nav-img" src="img/setting.png" alt="設定" />
        </button>
        <button id="logout-button" class="control-nav-button">
          <img class="control-nav-img" src="img/logout.png" alt="ログアウト" />
        </button>
      </section>
    </main>
  </body>
</html>
