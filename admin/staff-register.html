<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/admin.css" />
    <title>Document</title>
  </head>
  <body>
    <section class="header">
      <h2>スタッフ新規登録</h2>
    </section>
    <section class="main">
      <h3>店舗責任者は、新規スタッフの入社日に渡せるように用意すること。</h3>
      <h4>
        ※スタッフIDは、スタッフの苗字をローマ字で登録してください。ログイン用のIDとなります。
      </h4>
      <h4>ex. 吉田 太郎 → yoshida</h4>
    </section>
    <section class="main">
      <form action="staff-top.html" class="login-form">
        <div>
          <div>
            <label for="sid">スタッフID：</label>
            <input
              type="text"
              id="sid"
              placeholder="ローマ字、苗字のみ、ex. yoshida"
            />
          </div>
          <div>
            <label for="spw">パスワード：</label>
            <input
              type="password"
              id="spw"
              placeholder="初期はtestで、本人が変更するのを推奨。"
            />
          </div>
          <div>
            <label for="role">管理者権限：</label>
            <input type="radio" id="role" name="role" value="admin" />
            <label for="role">管理者</label>
            <input type="radio" id="role" name="role" value="staff" />
            <label for="role">スタッフ</label>
          </div>
          <div></div>
          <div class="login-btn">
            <button type="submit">新規登録</button>
          </div>
        </div>
      </form>
    </section>
    <footer>&copy; 2024 itsumono All rights reserved.</footer>
  </body>
</html>
